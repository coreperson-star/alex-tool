<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>레시피 북</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f8f8f7;--surface:#fff;--s2:#f4f4f3;--s3:#ececeb;
  --border:#e5e5e3;--border2:#d1d1ce;
  --text:#18181b;--t2:#71717a;--t3:#a1a1aa;
  --accent:#2563eb;--abg:#eff6ff;--at:#1d4ed8;
  --ok:#16a34a;--okbg:#f0fdf4;--okt:#15803d;
  --warn:#d97706;--red:#dc2626;--redbg:#fef2f2;--redt:#b91c1c;
  --radius:10px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
}
html{height:100%;overflow-x:hidden}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);
  font-size:14px;
  min-height:100vh;
  overflow-x:hidden;
  width:100%;
  max-width:100vw;
}

/* ── NICK ── */
#nickScreen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  background:linear-gradient(135deg,#1e293b,#334155);
  padding:20px;
  padding-top:calc(20px + var(--safe-top));
  padding-bottom:calc(20px + var(--safe-bottom));
}
.nick-card{background:#fff;border-radius:20px;padding:36px 24px;width:100%;max-width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.nick-logo{font-size:44px;margin-bottom:12px}
.nick-title{font-size:20px;font-weight:700;margin-bottom:6px}
.nick-sub{font-size:13px;color:var(--t2);margin-bottom:22px;line-height:1.5}
.nick-input{
  width:100%;padding:13px 14px;border:1.5px solid var(--border);
  border-radius:var(--radius);font-size:16px;font-family:inherit;
  outline:none;text-align:center;margin-bottom:12px;
  -webkit-appearance:none;appearance:none;
}
.nick-input:focus{border-color:var(--accent)}
.nick-btn{
  width:100%;padding:13px;border:none;border-radius:var(--radius);
  background:var(--accent);color:#fff;font-size:15px;font-weight:600;
  cursor:pointer;font-family:inherit;-webkit-appearance:none;
}
.nick-btn:active{opacity:.85}
.nick-tip{font-size:11px;color:var(--t3);margin-top:10px}

/* ── APP ── */
#appScreen{
  display:none;
  flex-direction:column;
  min-height:100vh;
  width:100%;
  overflow-x:hidden;
}

/* ── TOPBAR ── */
.topbar{
  height:52px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 14px;
  padding-top:var(--safe-top);
  gap:8px;
  flex-shrink:0;
  position:sticky;top:0;z-index:100;
  width:100%;
  overflow:hidden;
}
.logo{font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px;cursor:pointer;color:var(--text);flex-shrink:0}
.logo i{color:var(--accent);font-size:20px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:6px;flex-shrink:0}
.online-pill{display:flex;align-items:center;gap:5px;padding:4px 8px;background:var(--okbg);border-radius:99px;font-size:11px;color:var(--okt);font-weight:500;white-space:nowrap}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--ok);animation:pulse 2s infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}

/* ── BOTTOM NAV ── */
.bottom-nav{
  display:none;
  position:fixed;
  bottom:0;left:0;right:0;
  background:var(--surface);
  border-top:1px solid var(--border);
  z-index:200;
  padding-bottom:var(--safe-bottom);
}
.bn-items{display:flex;height:56px}
.bn-item{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:2px;cursor:pointer;
  color:var(--t3);font-size:10px;
  border:none;background:none;
  font-family:inherit;padding:0;
  -webkit-tap-highlight-color:transparent;
  text-decoration:none;
}
.bn-item.active{color:var(--accent)}
.bn-item i{font-size:22px}

/* ── DESKTOP NAV ── */
.topbar-nav{display:none;gap:2px;overflow-x:auto}
.nav-link{
  padding:6px 10px;border-radius:var(--radius);
  font-size:12px;color:var(--t2);cursor:pointer;
  text-decoration:none;display:flex;align-items:center;
  gap:5px;border:none;background:none;
  font-family:inherit;white-space:nowrap;flex-shrink:0;
}
.nav-link:hover{background:var(--s2);color:var(--text)}
.nav-link.active{background:var(--abg);color:var(--at);font-weight:500}

/* ── MAIN ── */
.main{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:16px;
  padding-bottom:calc(72px + var(--safe-bottom));
  width:100%;
}
.page{display:none;width:100%;overflow-x:hidden}
.page.active{display:block}

/* ── HERO ── */
.hero{background:linear-gradient(135deg,#1e293b,#334155);border-radius:14px;padding:22px 18px;color:#fff;margin-bottom:20px}
.hero h1{font-size:18px;font-weight:700;margin-bottom:6px}
.hero p{font-size:12px;opacity:.7;line-height:1.6;margin-bottom:14px}
.hero-btn{
  padding:10px 16px;border:none;border-radius:var(--radius);
  background:var(--accent);color:#fff;font-size:13px;font-weight:600;
  cursor:pointer;font-family:inherit;display:inline-flex;
  align-items:center;gap:6px;text-decoration:none;
  -webkit-appearance:none;
}

/* ── CARDS ── */
.section-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.cards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:22px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer}
.card:active{opacity:.8;transform:scale(.98)}
.card-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:8px}
.card-title{font-size:13px;font-weight:600;margin-bottom:2px}
.card-desc{font-size:11px;color:var(--t2);line-height:1.4}

/* ── ACTIVITY ── */
.act-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px}
.act-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.act-item:last-child{border-bottom:none}
.act-time{margin-left:auto;color:var(--t3);font-size:10px;white-space:nowrap;flex-shrink:0}

/* ── NOTES ── */
.notes-list-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden}
.notes-list-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.notes-list-title{font-size:13px;font-weight:600}
.note-item{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.note-item:last-child{border-bottom:none}
.note-item:active{background:var(--s2)}
.note-item.active{background:var(--abg);border-left:3px solid var(--accent)}
.note-item-title{font-size:12px;font-weight:500;margin-bottom:2px}
.note-item-preview{font-size:11px;color:var(--t3)}
.note-item-date{font-size:10px;color:var(--t3);margin-top:2px}
.notes-editor{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.note-toolbar{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.note-title-input{
  width:100%;padding:14px 14px 0;font-size:17px;font-weight:600;
  border:none;outline:none;font-family:inherit;color:var(--text);
  background:transparent;-webkit-appearance:none;display:block;
}
.note-body-input{
  width:100%;min-height:180px;padding:10px 14px 14px;
  font-size:13px;border:none;outline:none;
  font-family:inherit;color:var(--text);
  resize:none;background:transparent;line-height:1.8;
  -webkit-appearance:none;display:block;
}
.note-empty{display:flex;align-items:center;justify-content:center;height:100px;color:var(--t3);flex-direction:column;gap:8px}
.note-empty i{font-size:28px}

/* ── BOARD ── */
.board-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.btn{
  padding:9px 14px;border:1px solid var(--border);
  border-radius:var(--radius);background:var(--surface);
  font-size:13px;color:var(--t2);cursor:pointer;
  display:inline-flex;align-items:center;gap:5px;
  font-family:inherit;white-space:nowrap;
  -webkit-appearance:none;
}
.btn:active{opacity:.8}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.danger{color:var(--redt);border-color:#fca5a5}
.post-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.post-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.post-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.post-author{font-size:12px;font-weight:600}
.post-time{font-size:10px;color:var(--t3)}
.post-title{font-size:13px;font-weight:600;margin-bottom:5px}
.post-body{font-size:12px;color:var(--t2);line-height:1.6;margin-bottom:10px}
.post-footer{display:flex;align-items:center;gap:10px}
.post-action{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--t3);cursor:pointer;padding:6px 10px;border-radius:6px;min-height:36px}
.post-action:active{background:var(--s2)}
.post-action.liked{color:var(--red)}
.comment-area{border-top:1px solid var(--border);margin-top:10px;padding-top:10px;display:none}
.comment-item{display:flex;gap:7px;margin-bottom:7px;font-size:12px}
.comment-input-row{display:flex;gap:7px;margin-top:6px}
.comment-input{
  flex:1;padding:9px 10px;border:1px solid var(--border);
  border-radius:8px;font-size:16px;font-family:inherit;
  outline:none;background:var(--bg);-webkit-appearance:none;
  min-width:0;
}
.empty-board{text-align:center;padding:40px 20px;color:var(--t3)}
.empty-board i{font-size:36px;display:block;margin-bottom:8px}

/* ── MESSENGER ── */
.chat-rooms-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:12px;padding-bottom:4px}
.chat-rooms-row{display:flex;gap:8px;width:max-content;padding:2px 0}
.chat-room-chip{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;padding:10px 14px;border-radius:12px;
  border:1px solid var(--border);background:var(--s2);min-width:72px;
}
.chat-room-chip.active{background:var(--abg);border-color:var(--accent)}
.chat-room-chip-icon{font-size:22px}
.chat-room-chip-name{font-size:11px;font-weight:500;color:var(--t2);text-align:center}
.chat-room-chip.active .chat-room-chip-name{color:var(--at)}
.chat-main{background:var(--surface);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;height:380px}
.chat-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.chat-title{font-size:13px;font-weight:600}
.chat-online{font-size:11px;color:var(--okt)}
.chat-messages{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;display:flex;flex-direction:column;gap:8px}
.msg{display:flex;gap:7px;max-width:82%}
.msg.mine{align-self:flex-end;flex-direction:row-reverse}
.msg-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;align-self:flex-end}
.msg-name{font-size:10px;color:var(--t3);margin-bottom:2px}
.msg-bubble{padding:8px 11px;border-radius:12px;font-size:13px;line-height:1.5;word-break:break-word}
.msg .msg-bubble{background:var(--s2);border-radius:4px 12px 12px 12px}
.msg.mine .msg-bubble{background:var(--accent);color:#fff;border-radius:12px 4px 12px 12px}
.msg-time{font-size:10px;color:var(--t3);margin-top:2px}
.chat-input-area{
  padding:10px 12px;
  padding-bottom:calc(10px + var(--safe-bottom));
  border-top:1px solid var(--border);
  display:flex;gap:8px;align-items:flex-end;flex-shrink:0;
}
.chat-input{
  flex:1;min-width:0;padding:9px 12px;border:1px solid var(--border);
  border-radius:var(--radius);font-size:16px;font-family:inherit;
  outline:none;resize:none;background:var(--bg);-webkit-appearance:none;
}
.chat-input:focus{border-color:var(--accent)}
.chat-send{
  width:40px;height:40px;border:none;border-radius:var(--radius);
  background:var(--accent);color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  -webkit-appearance:none;
}

/* ── NEWS ── */
.news-grid{display:flex;flex-direction:column;gap:12px}
.news-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;gap:0}
.news-thumb{width:90px;min-width:90px;height:90px;background:linear-gradient(135deg,var(--s2),var(--s3));display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0}
.news-body{padding:12px;flex:1;min-width:0}
.news-tag{font-size:10px;font-weight:600;color:var(--at);background:var(--abg);padding:2px 8px;border-radius:99px;display:inline-block;margin-bottom:5px}
.news-title{font-size:12px;font-weight:600;margin-bottom:4px;line-height:1.4}
.news-desc{font-size:11px;color:var(--t2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ── MODALS (sheet style) ── */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.5);
  align-items:flex-end;justify-content:center;
  z-index:1000;
}
.overlay.open{display:flex}
.modal{
  background:var(--surface);
  border-radius:20px 20px 0 0;
  padding:16px 18px;
  padding-bottom:calc(16px + var(--safe-bottom));
  width:100%;
  max-height:90vh;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:99px;margin:0 auto 14px}
.modal-title{font-size:15px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:8px}
.modal-sub{font-size:12px;color:var(--t2);margin-bottom:14px}
.modal label{font-size:11px;font-weight:500;color:var(--t2);display:block;margin-bottom:4px;margin-top:12px}
.modal label:first-of-type{margin-top:0}
.modal input,.modal textarea,.modal select{
  width:100%;padding:12px;border:1px solid var(--border);
  border-radius:var(--radius);font-size:16px;font-family:inherit;
  outline:none;background:var(--bg);color:var(--text);
  -webkit-appearance:none;appearance:none;
}
.modal input:focus,.modal textarea:focus{border-color:var(--accent)}
.modal textarea{resize:none;min-height:100px;line-height:1.6}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.icon-btn{
  width:32px;height:32px;border:1px solid var(--border);
  border-radius:8px;background:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--t2);
  -webkit-appearance:none;flex-shrink:0;
}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:calc(70px + var(--safe-bottom));
  left:50%;transform:translateX(-50%);
  background:#18181b;color:#fff;
  padding:10px 20px;border-radius:99px;
  font-size:13px;display:none;
  align-items:center;gap:8px;z-index:9999;
  white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3);
}
#toast.show{display:flex}

/* ── DESKTOP ── */
@media(min-width:768px){
  body{overflow-x:auto}
  .bottom-nav{display:none!important}
  .topbar-nav{display:flex}
  .main{padding:24px;padding-bottom:24px;max-width:900px;margin:0 auto}
  .notes-list-wrap{max-height:none}
  .chat-main{height:500px}
  .news-grid{display:grid;grid-template-columns:repeat(3,1fr)}
  .news-card{flex-direction:column}
  .news-thumb{width:100%;height:120px}
  .cards-grid{grid-template-columns:repeat(3,1fr)}
  .overlay{align-items:center;padding:20px}
  .modal{border-radius:16px;max-width:480px;padding-bottom:16px}
  #toast{bottom:24px}
}
@media(max-width:767px){
  .bottom-nav{display:flex}
  .topbar-nav{display:none}
}
</style>
</head>
<body>

<div id="nickScreen">
  <div class="nick-card">
    <div class="nick-logo">🍳</div>
    <div class="nick-title">레시피 북</div>
    <div class="nick-sub">팀과 함께 레시피를 만들고<br>공유하는 협업 플랫폼</div>
    <input class="nick-input" id="nickInput" type="text" placeholder="닉네임 입력..." maxlength="12">
    <button class="nick-btn" onclick="enterApp()">입장하기</button>
    <div class="nick-tip">닉네임은 협업자들에게 표시됩니다</div>
  </div>
</div>

<div id="appScreen">
  <div class="topbar">
    <span class="logo" onclick="showPage('home')"><i class="ti ti-chef-hat"></i>레시피 북</span>
    <div class="topbar-nav" id="topbarNav">
      <button class="nav-link active" id="nav-home" onclick="showPage('home')"><i class="ti ti-home"></i>홈</button>
      <button class="nav-link" id="nav-notes" onclick="showPage('notes')"><i class="ti ti-note"></i>노트</button>
      <button class="nav-link" id="nav-news" onclick="showPage('news')"><i class="ti ti-news"></i>뉴스</button>
      <button class="nav-link" id="nav-board" onclick="showPage('board')"><i class="ti ti-message-circle"></i>게시판</button>
      <button class="nav-link" id="nav-chat" onclick="showPage('chat')"><i class="ti ti-messages"></i>메신저</button>
      <a class="nav-link" href="recipe.html"><i class="ti ti-book"></i>레시피</a>
    </div>
    <div class="topbar-right">
      <div class="online-pill"><div class="pulse"></div><span id="onlineCount">0명</span></div>
      <div class="av" id="myAv" style="background:#dbeafe;color:#1d4ed8">나</div>
    </div>
  </div>

  <div class="main">
    <!-- HOME -->
    <div class="page active" id="page-home">
      <div class="hero">
        <h1>안녕하세요, <span id="heroNick">사용자</span>님! 👋</h1>
        <p>레시피를 만들고, 노트를 작성하고<br>팀원과 실시간으로 소통하세요.</p>
        <a class="hero-btn" href="recipe.html"><i class="ti ti-book"></i>레시피 앱 열기</a>
      </div>
      <div class="section-title"><i class="ti ti-layout-grid" style="color:var(--accent)"></i>빠른 메뉴</div>
      <div class="cards-grid">
        <div class="card" onclick="location.href='recipe.html'"><div class="card-icon" style="background:#eff6ff">🍲</div><div class="card-title">레시피</div><div class="card-desc">실시간 협업</div></div>
        <div class="card" onclick="showPage('notes')"><div class="card-icon" style="background:#f0fdf4">📝</div><div class="card-title">노트</div><div class="card-desc">메모 정리</div></div>
        <div class="card" onclick="showPage('news')"><div class="card-icon" style="background:#fffbeb">📰</div><div class="card-title">뉴스</div><div class="card-desc">요리 트렌드</div></div>
        <div class="card" onclick="showPage('board')"><div class="card-icon" style="background:#fef2f2">💬</div><div class="card-title">게시판</div><div class="card-desc">팀원 소통</div></div>
        <div class="card" onclick="showPage('chat')"><div class="card-icon" style="background:#f3e8ff">💬</div><div class="card-title">메신저</div><div class="card-desc">실시간 채팅</div></div>
      </div>
      <div class="section-title"><i class="ti ti-activity" style="color:var(--accent)"></i>실시간 활동</div>
      <div class="act-box" id="homeActivity"><div style="text-align:center;color:var(--t3);font-size:12px;padding:16px">로딩 중...</div></div>
    </div>

    <!-- NOTES -->
    <div class="page" id="page-notes">
      <div class="board-header">
        <div class="section-title" style="margin-bottom:0"><i class="ti ti-note" style="color:var(--accent)"></i>노트</div>
        <button class="btn primary" onclick="newNote()"><i class="ti ti-plus"></i>새 노트</button>
      </div>
      <div style="height:12px"></div>
      <div class="notes-list-wrap">
        <div class="notes-list-header"><span class="notes-list-title">목록</span></div>
        <div id="noteList"></div>
      </div>
      <div class="notes-editor">
        <div class="note-toolbar">
          <button class="btn primary" onclick="saveNote()"><i class="ti ti-device-floppy"></i>저장</button>
          <button class="btn danger" id="deleteNoteBtn" onclick="deleteNote()" style="display:none"><i class="ti ti-trash"></i>삭제</button>
          <span style="margin-left:auto;font-size:11px;color:var(--t3)" id="noteStatus"></span>
        </div>
        <div id="noteEditorEmpty" class="note-empty"><i class="ti ti-note-off"></i><span style="font-size:12px">노트를 선택하거나 새로 만드세요</span></div>
        <div id="noteEditorContent" style="display:none">
          <input class="note-title-input" id="noteTitleInput" placeholder="제목...">
          <textarea class="note-body-input" id="noteBodyInput" placeholder="내용..."></textarea>
        </div>
      </div>
    </div>

    <!-- NEWS -->
    <div class="page" id="page-news">
      <div class="board-header">
        <div class="section-title" style="margin-bottom:0"><i class="ti ti-news" style="color:var(--accent)"></i>뉴스</div>
        <button class="btn" onclick="loadNews()"><i class="ti ti-refresh"></i>새로고침</button>
      </div>
      <div style="height:12px"></div>
      <div class="news-grid" id="newsGrid"></div>
    </div>

    <!-- BOARD -->
    <div class="page" id="page-board">
      <div class="board-header">
        <div class="section-title" style="margin-bottom:0"><i class="ti ti-message-circle" style="color:var(--accent)"></i>게시판</div>
        <button class="btn primary" onclick="openPostModal()"><i class="ti ti-plus"></i>글쓰기</button>
      </div>
      <div style="height:12px"></div>
      <div id="boardList"></div>
    </div>

    <!-- CHAT -->
    <div class="page" id="page-chat">
      <div class="section-title"><i class="ti ti-messages" style="color:var(--accent)"></i>메신저</div>
      <div class="chat-rooms-scroll"><div class="chat-rooms-row" id="roomList"></div></div>
      <div class="chat-main">
        <div class="chat-header">
          <span id="chatRoomIcon" style="font-size:20px">💬</span>
          <div><div class="chat-title" id="chatRoomTitle">채팅방 선택</div><div class="chat-online" id="chatOnline"></div></div>
        </div>
        <div class="chat-messages" id="chatMessages">
          <div style="text-align:center;color:var(--t3);font-size:12px;margin:auto">채팅방을 선택하세요</div>
        </div>
        <div class="chat-input-area">
          <textarea class="chat-input" id="chatInput" placeholder="메시지 입력..." rows="1" onkeydown="handleChatKey(event)"></textarea>
          <button class="chat-send" onclick="sendMsg()"><i class="ti ti-send" style="font-size:16px"></i></button>
        </div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <div class="bn-items">
      <button class="bn-item active" id="bn-home" onclick="showPage('home')"><i class="ti ti-home"></i>홈</button>
      <button class="bn-item" id="bn-notes" onclick="showPage('notes')"><i class="ti ti-note"></i>노트</button>
      <button class="bn-item" id="bn-board" onclick="showPage('board')"><i class="ti ti-message-circle"></i>게시판</button>
      <button class="bn-item" id="bn-chat" onclick="showPage('chat')"><i class="ti ti-messages"></i>메신저</button>
      <a class="bn-item" href="recipe.html"><i class="ti ti-book"></i>레시피</a>
    </div>
  </nav>
</div>

<!-- POST MODAL -->
<div class="overlay" id="postModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title"><i class="ti ti-pencil"></i>새 글 작성</div>
    <label>제목</label><input type="text" id="postTitle" placeholder="제목...">
    <label>내용</label><textarea id="postBody" placeholder="내용..." style="min-height:120px"></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('postModal')">취소</button>
      <button class="btn primary" onclick="submitPost()">게시하기</button>
    </div>
  </div>
</div>

<div id="toast"><i class="ti ti-check" id="toastIcon"></i><span id="toastMsg"></span></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyCoy68_0vIna3tpiQWEcc39GFYmjZ5_YMM",authDomain:"kitchen-big.firebaseapp.com",databaseURL:"https://kitchen-big-default-rtdb.firebaseio.com",projectId:"kitchen-big",storageBucket:"kitchen-big.firebasestorage.app",messagingSenderId:"957524723895",appId:"1:957524723895:web:9d014ebbb7e5c28fb4e532"});
var db=firebase.database();
var AV_PAL=['#dbeafe:#1d4ed8','#fce7f3:#9d174d','#dcfce7:#166534','#fef3c7:#92400e','#f3e8ff:#6b21a8','#ffedd5:#c2410c'];
var myNick='',myId='',activeNote=null,activeRoom='general',boardData={},notes={},chatUnsub=null;

function avColor(s){var n=0;for(var i=0;i<(s||'').length;i++)n+=s.charCodeAt(i);var p=AV_PAL[n%AV_PAL.length].split(':');return{bg:p[0],tc:p[1]};}
function timeAgo(ts){if(!ts)return'';var d=Date.now()-ts;if(d<60000)return'방금 전';if(d<3600000)return Math.floor(d/60000)+'분 전';if(d<86400000)return Math.floor(d/3600000)+'시간 전';return Math.floor(d/86400000)+'일 전';}

function enterApp(){
  var nick=document.getElementById('nickInput').value.trim();
  if(!nick){document.getElementById('nickInput').focus();return;}
  myNick=nick;myId='u_'+Math.random().toString(36).slice(2,8);
  sessionStorage.setItem('nick',nick);sessionStorage.setItem('uid',myId);
  var c=avColor(myId);
  document.getElementById('heroNick').textContent=nick;
  var av=document.getElementById('myAv');av.textContent=nick.charAt(0).toUpperCase();av.style.background=c.bg;av.style.color=c.tc;
  var pr=db.ref('presence/'+myId);pr.set({nick:nick,id:myId,ts:Date.now()});pr.onDisconnect().remove();
  document.getElementById('nickScreen').style.display='none';
  document.getElementById('appScreen').style.display='flex';
  subscribeAll();loadNews();initRooms();
}
document.getElementById('nickInput').addEventListener('keydown',function(e){if(e.key==='Enter')enterApp();});
var sN=sessionStorage.getItem('nick');if(sN)document.getElementById('nickInput').value=sN;

function subscribeAll(){
  db.ref('presence').on('value',function(s){document.getElementById('onlineCount').textContent=Object.keys(s.val()||{}).length+'명';});
  db.ref('activity').on('value',function(s){var list=Object.values(s.val()||{}).sort(function(a,b){return(b.ts||0)-(a.ts||0);}).slice(0,10);renderHomeActivity(list);});
  db.ref('notes').on('value',function(s){notes=s.val()||{};renderNoteList(notes);});
  db.ref('board').on('value',function(s){boardData=s.val()||{};renderBoard(boardData);});
}
function log(action){var k=db.ref('activity').push().key;db.ref('activity/'+k).set({who:myNick,id:myId,action:action,ts:Date.now()});}

function showPage(id){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nav-link,.bn-item').forEach(function(n){n.classList.remove('active');});
  document.getElementById('page-'+id).classList.add('active');
  var nb=document.getElementById('nav-'+id);if(nb)nb.classList.add('active');
  var bb=document.getElementById('bn-'+id);if(bb)bb.classList.add('active');
  if(id==='news')loadNews();
  if(id==='chat')initChat();
}

function renderHomeActivity(list){
  var el=document.getElementById('homeActivity');
  if(!list.length){el.innerHTML='<div style="text-align:center;color:var(--t3);font-size:12px;padding:16px">아직 활동이 없습니다.</div>';return;}
  el.innerHTML=list.map(function(a){var c=avColor(a.id||'');return'<div class="act-item"><div class="av" style="background:'+c.bg+';color:'+c.tc+';font-size:11px;width:26px;height:26px">'+((a.who||'?').charAt(0))+'</div><span style="font-size:12px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><strong>'+a.who+'</strong> '+a.action+'</span><span class="act-time">'+timeAgo(a.ts)+'</span></div>';}).join('');
}

// NOTES
function renderNoteList(data){
  var el=document.getElementById('noteList');el.innerHTML='';
  var list=Object.entries(data).sort(function(a,b){return(b[1].updatedAt||0)-(a[1].updatedAt||0);});
  if(!list.length){el.innerHTML='<div style="padding:14px;text-align:center;font-size:12px;color:var(--t3)">노트가 없습니다</div>';return;}
  list.forEach(function(en){
    var id=en[0],n=en[1];var d=document.createElement('div');d.className='note-item'+(activeNote===id?' active':'');
    d.innerHTML='<div class="note-item-title">'+(n.title||'제목 없음')+'</div><div class="note-item-preview">'+((n.body||'').slice(0,30)||'내용 없음')+'</div><div class="note-item-date">'+timeAgo(n.updatedAt)+'</div>';
    d.onclick=function(){openNote(id);};el.appendChild(d);
  });
}
function newNote(){activeNote=null;document.getElementById('noteEditorEmpty').style.display='none';document.getElementById('noteEditorContent').style.display='block';document.getElementById('noteTitleInput').value='';document.getElementById('noteBodyInput').value='';document.getElementById('deleteNoteBtn').style.display='none';document.getElementById('noteStatus').textContent='';document.getElementById('noteTitleInput').focus();}
function openNote(id){activeNote=id;var n=notes[id];if(!n)return;document.getElementById('noteEditorEmpty').style.display='none';document.getElementById('noteEditorContent').style.display='block';document.getElementById('noteTitleInput').value=n.title||'';document.getElementById('noteBodyInput').value=n.body||'';document.getElementById('deleteNoteBtn').style.display='inline-flex';renderNoteList(notes);}
function saveNote(){
  var title=document.getElementById('noteTitleInput').value.trim(),body=document.getElementById('noteBodyInput').value,st=document.getElementById('noteStatus');
  if(!title){document.getElementById('noteTitleInput').focus();st.textContent='제목을 입력하세요';st.style.color='var(--redt)';return;}
  st.textContent='저장 중...';st.style.color='var(--t3)';
  var data={title:title,body:body,updatedAt:Date.now(),editedBy:myNick};
  if(activeNote){db.ref('notes/'+activeNote).update(data,function(){st.textContent='✓ 저장됨';st.style.color='var(--okt)';toast('저장됨','ok');setTimeout(function(){st.textContent='';},3000);});}
  else{var k=db.ref('notes').push().key;data.createdBy=myNick;data.createdAt=Date.now();db.ref('notes/'+k).set(data,function(){activeNote=k;st.textContent='✓ 저장됨';st.style.color='var(--okt)';toast('저장됨','ok');setTimeout(function(){st.textContent='';},3000);});}
  log('노트 "'+title+'" 저장');
}
function deleteNote(){if(!activeNote||!confirm('삭제할까요?'))return;db.ref('notes/'+activeNote).remove();activeNote=null;document.getElementById('noteEditorEmpty').style.display='flex';document.getElementById('noteEditorContent').style.display='none';toast('삭제됨','ok');}

// NEWS
var NEWS_EMOJIS=['🍳','🥗','🍜','🥘','🍱','🥩','🍕','🥙','🫕','🍣','🧆','🥗'];
var NEWS_TAGS=['요리','레시피','식품','트렌드','건강','문화'];
function loadNews(){
  var el=document.getElementById('newsGrid');
  el.innerHTML='<div style="text-align:center;padding:30px;color:var(--t3);font-size:13px"><i class="ti ti-loader" style="font-size:24px;display:block;margin-bottom:8px;animation:spin 1s linear infinite"></i>뉴스 불러오는 중...</div>';
  var apiKey='ff405bd823ef460a8413f91d023ead81';
  var url='https://newsapi.org/v2/everything?q=food+recipe+cooking&language=en&sortBy=publishedAt&pageSize=12&apiKey='+apiKey;
  fetch(url)
    .then(function(r){return r.json();})
    .then(function(data){
      el.innerHTML='';
      var articles=data.articles||[];
      if(!articles.length){
        el.innerHTML='<div style="text-align:center;padding:30px;color:var(--t3);font-size:13px">뉴스를 불러오지 못했습니다.<br><button class="btn" onclick="loadNews()" style="margin-top:10px"><i class="ti ti-refresh"></i> 다시 시도</button></div>';
        return;
      }
      articles.forEach(function(a,i){
        if(!a.title||a.title==='[Removed]')return;
        var d=document.createElement('div');d.className='news-card';
        var date=a.publishedAt?new Date(a.publishedAt).toLocaleDateString('ko-KR',{month:'long',day:'numeric'}):'';
        var tag=NEWS_TAGS[i%NEWS_TAGS.length];
        var emoji=NEWS_EMOJIS[i%NEWS_EMOJIS.length];
        var thumb=a.urlToImage?'<img src="'+a.urlToImage+'" style="width:100%;height:100%;object-fit:cover" onerror="this.parentNode.innerHTML=\''+emoji+'\'">':emoji;
        d.innerHTML='<div class="news-thumb">'+thumb+'</div><div class="news-body"><span class="news-tag">'+tag+'</span><div class="news-title">'+a.title+'</div><div class="news-desc">'+(a.description||'')+'</div><div style="font-size:11px;color:var(--t3);margin-top:6px;display:flex;justify-content:space-between"><span>'+(a.source&&a.source.name?a.source.name:'')+'</span><span>'+date+'</span></div></div>';
        d.style.cursor='pointer';
        d.onclick=function(){if(a.url)window.open(a.url,'_blank');};
        el.appendChild(d);
      });
    })
    .catch(function(){
      el.innerHTML='<div style="text-align:center;padding:30px;color:var(--t3);font-size:13px">뉴스를 불러오지 못했습니다.<br><button class="btn" onclick="loadNews()" style="margin-top:10px"><i class="ti ti-refresh"></i> 다시 시도</button></div>';
    });
}

// BOARD
function renderBoard(data){
  var el=document.getElementById('boardList');el.innerHTML='';
  var list=Object.entries(data).sort(function(a,b){return(b[1].ts||0)-(a[1].ts||0);});
  if(!list.length){el.innerHTML='<div class="empty-board"><i class="ti ti-message-off"></i><p>첫 글을 작성해보세요!</p></div>';return;}
  list.forEach(function(en){
    var id=en[0],p=en[1];var c=avColor(p.authorId||'');
    var likes=p.likes?Object.keys(p.likes).length:0;var iLike=p.likes&&p.likes[myId];
    var comments=p.comments?Object.values(p.comments):[];
    var d=document.createElement('div');d.className='post-card';d.id='post-'+id;
    d.innerHTML='<div class="post-header"><div class="post-av" style="background:'+c.bg+';color:'+c.tc+'">'+((p.author||'?').charAt(0))+'</div><div style="flex:1"><div class="post-author">'+(p.author||'?')+'</div><div class="post-time">'+timeAgo(p.ts)+'</div></div>'+(p.authorId===myId?'<button class="btn danger" style="padding:6px 8px;font-size:11px" onclick="deletePost(\''+id+'\')"><i class="ti ti-trash"></i></button>':'')+'</div><div class="post-title">'+(p.title||'')+'</div><div class="post-body">'+(p.body||'')+'</div><div class="post-footer"><span class="post-action'+(iLike?' liked':'')+'" onclick="toggleLike(\''+id+'\')"><i class="ti ti-heart'+(iLike?'-filled':'')+'"></i> '+likes+'</span><span class="post-action" onclick="toggleComments(\''+id+'\')"><i class="ti ti-message"></i> '+comments.length+'</span></div><div class="comment-area" id="comments-'+id+'">'+comments.map(function(cm){var cc=avColor(cm.uid||'');return'<div class="comment-item"><div class="av" style="background:'+cc.bg+';color:'+cc.tc+';width:22px;height:22px;font-size:9px">'+((cm.author||'?').charAt(0))+'</div><div style="flex:1;font-size:12px"><strong>'+cm.author+'</strong> '+cm.text+'</div></div>';}).join('')+'<div class="comment-input-row"><input class="comment-input" placeholder="댓글..." id="ci-'+id+'"><button class="btn primary" style="padding:8px 10px" onclick="submitComment(\''+id+'\')"><i class="ti ti-send"></i></button></div></div>';
    el.appendChild(d);
  });
}
function openPostModal(){document.getElementById('postTitle').value='';document.getElementById('postBody').value='';document.getElementById('postModal').classList.add('open');setTimeout(function(){document.getElementById('postTitle').focus();},100);}
function submitPost(){var title=document.getElementById('postTitle').value.trim(),body=document.getElementById('postBody').value.trim();if(!title||!body){toast('제목과 내용을 입력하세요','warn');return;}var k=db.ref('board').push().key;db.ref('board/'+k).set({title:title,body:body,author:myNick,authorId:myId,ts:Date.now()});log('게시판에 "'+title+'" 게시');closeModal('postModal');toast('게시됨','ok');}
function deletePost(id){if(!confirm('삭제할까요?'))return;db.ref('board/'+id).remove();toast('삭제됨','ok');}
function toggleLike(id){var p=boardData[id];if(!p)return;if(p.likes&&p.likes[myId])db.ref('board/'+id+'/likes/'+myId).remove();else db.ref('board/'+id+'/likes/'+myId).set(true);}
function toggleComments(id){var el=document.getElementById('comments-'+id);el.style.display=el.style.display==='block'?'none':'block';}
function submitComment(id){var input=document.getElementById('ci-'+id);var text=input.value.trim();if(!text)return;var k=db.ref('board/'+id+'/comments').push().key;db.ref('board/'+id+'/comments/'+k).set({text:text,author:myNick,uid:myId,ts:Date.now()});input.value='';}

// CHAT
var ROOMS=[{id:'general',name:'일반',icon:'💬'},{id:'recipe',name:'레시피',icon:'🍲'},{id:'tips',name:'요리팁',icon:'💡'},{id:'notice',name:'공지',icon:'📢'}];
function initRooms(){var el=document.getElementById('roomList');el.innerHTML='';ROOMS.forEach(function(r){var d=document.createElement('div');d.className='chat-room-chip'+(activeRoom===r.id?' active':'');d.innerHTML='<div class="chat-room-chip-icon">'+r.icon+'</div><div class="chat-room-chip-name">'+r.name+'</div>';d.onclick=function(){selectRoom(r.id);};el.appendChild(d);});}
function initChat(){initRooms();selectRoom(activeRoom);}
function selectRoom(id){
  activeRoom=id;var room=ROOMS.find(function(r){return r.id===id;});
  document.getElementById('chatRoomTitle').textContent=room?room.name:id;
  document.getElementById('chatRoomIcon').textContent=room?room.icon:'💬';
  document.querySelectorAll('.chat-room-chip').forEach(function(el,i){el.classList.toggle('active',ROOMS[i].id===id);});
  var msgEl=document.getElementById('chatMessages');msgEl.innerHTML='';
  if(chatUnsub)db.ref('chat/'+id).off('value',chatUnsub);
  chatUnsub=function(snap){
    var data=snap.val()||{};var msgs=Object.values(data).sort(function(a,b){return(a.ts||0)-(b.ts||0);});
    msgEl.innerHTML='';
    if(!msgs.length){msgEl.innerHTML='<div style="text-align:center;color:var(--t3);font-size:12px;margin:auto">첫 메시지를 보내보세요!</div>';return;}
    msgs.forEach(function(m){var mine=m.uid===myId;var c=avColor(m.uid||'');var d=document.createElement('div');d.className='msg'+(mine?' mine':'');d.innerHTML='<div class="msg-av" style="background:'+c.bg+';color:'+c.tc+'">'+((m.who||'?').charAt(0))+'</div><div class="msg-content">'+((!mine)?'<div class="msg-name">'+m.who+'</div>':'')+'<div class="msg-bubble">'+m.text+'</div><div class="msg-time">'+timeAgo(m.ts)+'</div></div>';msgEl.appendChild(d);});
    msgEl.scrollTop=msgEl.scrollHeight;
  };
  db.ref('chat/'+id).on('value',chatUnsub);
}
function sendMsg(){var input=document.getElementById('chatInput');var text=input.value.trim();if(!text||!activeRoom)return;input.value='';var k=db.ref('chat/'+activeRoom).push().key;db.ref('chat/'+activeRoom+'/'+k).set({text:text,who:myNick,uid:myId,ts:Date.now()});}
function handleChatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}

function closeModal(id){document.getElementById(id).classList.remove('open');}
var toastT=null;
function toast(msg,type){var t=document.getElementById('toast');document.getElementById('toastMsg').textContent=msg;document.getElementById('toastIcon').className=type==='ok'?'ti ti-check':'ti ti-alert-triangle';t.style.background=type==='warn'?'#92400e':'#18181b';t.classList.add('show');if(toastT)clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show');},2500);}
document.addEventListener('keydown',function(e){if(e.key==='Escape')document.querySelectorAll('.overlay.open').forEach(function(o){o.classList.remove('open');});});
// 모달 바깥 터치시 닫기
document.querySelectorAll('.overlay').forEach(function(o){o.addEventListener('click',function(e){if(e.target===o)o.classList.remove('open');});});
</script>
</body>
</html>
